name: Lint & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check code with npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Validate package.json
      run: |
        if [ -f package.json ]; then
          node -e "require('./package.json')" && echo "✓ package.json is valid JSON"
        fi

    - name: Check for console.log in production code
      run: |
        if grep -r "console\.log" main.js preload.js 2>/dev/null | grep -v "console.warn\|console.error"; then
          echo "⚠️  Warning: Found console.log in production code"
          exit 0
        fi

    - name: Verify critical files exist
      run: |
        for file in main.js preload.js index.html package.json README.md LICENSE; do
          if [ ! -f "$file" ]; then
            echo "✗ Missing critical file: $file"
            exit 1
          fi
        done
        echo "✓ All critical files present"

    - name: Check file sizes
      run: |
        echo "File sizes:"
        ls -lh main.js preload.js index.html
        SIZE=$(wc -c < main.js)
        if [ "$SIZE" -gt 100000 ]; then
          echo "⚠️  Warning: main.js is quite large ($(( SIZE / 1024 ))KB)"
        fi

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --production
      continue-on-error: true

    - name: Check for hardcoded secrets
      run: |
        if grep -r "password\|secret\|key\|token" main.js preload.js index.html --ignore-case | grep -v "// \|\/\* \|data:"; then
          echo "⚠️  Possible hardcoded secret found (please review)"
          exit 0
        fi

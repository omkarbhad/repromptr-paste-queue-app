<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>repromptr — AI Config</title>
  <style>
    :root {
      --bg: #0a0a0e;
      --card: #161620;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #7c6cf0;
      --accent-dim: rgba(124, 108, 240, 0.25);
      --text: rgba(255, 255, 255, 0.92);
      --text2: rgba(255, 255, 255, 0.50);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      -webkit-font-smoothing: antialiased;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: var(--text2);
    }

    input,
    select {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.15s;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
    }

    #baseurl-row {
      display: none;
    }

    #baseurl-row.visible {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    button {
      padding: 8px 16px;
      background: var(--accent-dim);
      border: 1px solid rgba(124, 108, 240, 0.4);
      border-radius: 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.1s;
      align-self: flex-end;
      margin-top: 4px;
    }

    button:hover {
      background: rgba(124, 108, 240, 0.35);
    }

    #status {
      font-size: 11px;
      color: var(--text2);
      min-height: 16px;
      text-align: center;
    }

    #status.ok {
      color: #34d399;
    }

    #status.err {
      color: #f87171;
    }
  </style>
</head>

<body>
  <h2>⚙ AI Config</h2>

  <label>Provider
    <select id="provider">
      <option value="openai">OpenAI</option>
      <option value="claude">Claude (Anthropic)</option>
      <option value="openrouter">OpenRouter</option>
      <option value="custom">Custom endpoint</option>
    </select>
  </label>

  <label>API Key
    <input id="apikey" type="password" placeholder="sk-…" autocomplete="off" spellcheck="false">
  </label>

  <label>Model
    <input id="model" type="text" placeholder="gpt-4o-mini" spellcheck="false">
  </label>

  <label id="baseurl-row">Base URL
    <input id="baseurl" type="text" placeholder="https://your-endpoint.com" spellcheck="false">
  </label>

  <label>Custom System Prompt <span style="font-size:10px;opacity:0.5">(optional)</span>
    <textarea id="sysprompt" rows="3" placeholder="Override the default system prompt…" spellcheck="false"
      style="background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;padding:7px 10px;outline:none;font-family:inherit;width:100%;resize:vertical;transition:border-color 0.15s;"></textarea>
  </label>

  <div id="status"></div>

  <button id="save-btn">Save</button>

  <script>
    const DEFAULTS = { openai: "gpt-4o-mini", claude: "claude-haiku-4-5-20251001", openrouter: "openai/gpt-4o-mini", custom: "" };

    const provider = document.getElementById("provider");
    const apikey = document.getElementById("apikey");
    const model = document.getElementById("model");
    const baseurl = document.getElementById("baseurl");
    const sysprompt = document.getElementById("sysprompt");
    const baseurlRow = document.getElementById("baseurl-row");
    const saveBtn = document.getElementById("save-btn");
    const statusEl = document.getElementById("status");

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type || "";
      if (msg) setTimeout(() => { statusEl.textContent = ""; statusEl.className = ""; }, 2000);
    }

    provider.addEventListener("change", () => {
      baseurlRow.classList.toggle("visible", provider.value === "custom");
      if (DEFAULTS[provider.value] !== undefined && (!model.value || Object.values(DEFAULTS).includes(model.value))) {
        model.value = DEFAULTS[provider.value];
      }
    });

    saveBtn.addEventListener("click", async () => {
      await window.api.saveConfig({
        provider: provider.value,
        apiKey: apikey.value.trim(),
        model: model.value.trim(),
        baseUrl: baseurl.value.trim(),
        systemPrompt: sysprompt.value.trim(),
      });
      setStatus("Saved!", "ok");
      setTimeout(() => window.close(), 800);
    });

    // Load current config
    window.api.getConfig().then((cfg) => {
      provider.value = cfg.provider || "openai";
      apikey.value = cfg.apiKey || "";
      model.value = cfg.model || "gpt-4o-mini";
      baseurl.value = cfg.baseUrl || "";
      sysprompt.value = cfg.systemPrompt || "";
      baseurlRow.classList.toggle("visible", cfg.provider === "custom");
    });
  </script>
</body>

</html>
